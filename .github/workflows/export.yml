name: Export WordPress content

on:
  workflow_dispatch:
  schedule:
    - cron: "15 4 * * *"

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run WordPress export script
        run: python scripts/export_wordpress.py

      - name: Commit generated export files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add public/site-export.json public/site-export.md
          git commit -m "Update WordPress export files" || echo "No changes to commit"
          git push
